ancestor: null
releases:
  0.1.0:
    release_date: '2026-06-18'
    changes:
      release_summary: >-
        Initial release of the mlowcher61.ivanti_itsm collection. Automates Ivanti
        Neurons for ITSM / Ivanti Service Manager through its REST/OData Business
        Object API, built for Ansible Automation Platform (AAP) and Event-Driven
        Ansible (EDA) with closed-loop remediation as the primary use case.
    modules:
      - name: ivanti_business_object
        description: Manage Ivanti ITSM business objects through REST/OData
        namespace: ''
      - name: ivanti_incident
        description: Manage Ivanti ITSM incidents
        namespace: ''
  0.2.0:
    release_date: '2026-06-18'
    changes:
      release_summary: >-
        Adds the ivanti_ticket_note module for recording journal notes on tickets,
        supporting closed-loop remediation write-backs.
      minor_changes:
        - ivanti_client - add C(add_related) helper that creates a child business object
          and links it to a parent through a relationship navigation property.
    modules:
      - name: ivanti_ticket_note
        description: Add a journal note to an Ivanti ITSM ticket
        namespace: ''
  0.2.1:
    release_date: '2026-06-18'
    changes:
      release_summary: >-
        Adds journal note support to the ivanti_incident role.
      minor_changes:
        - ivanti_incident role - record a journal note after managing an incident.
          When C(ivanti_incident_note) is set and state is present/closed/resolved,
          the role calls ivanti_ticket_note, auto-resolving the RecId from the
          override, the operated incident, or the one created in the same run.
  0.2.2:
    release_date: '2026-06-23'
    changes:
      release_summary: >-
        Bug fixes to the configure_aap config-as-code playbook for ansible.eda
        module parameter names.
      bugfixes:
        - configure_aap playbook - use C(image_url) instead of C(image) for the
          ansible.eda.decision_environment task, which requires C(image_url) when
          state is present.
        - configure_aap playbook - use the canonical C(rulebook_name) parameter
          instead of the C(rulebook) alias for ansible.eda.rulebook_activation.
        - collections/requirements.yml - cap ansible.eda below 3.0.0 so the
          rulebook_activation C(enabled) parameter (deprecated for removal in
          3.0.0) remains supported.

---
- name: Create Ivanti ITSM incident from AAP
  hosts: localhost
  gather_facts: false

  vars:
    ivanti_base_url: "{{ lookup('env', 'IVANTI_BASE_URL') }}"
    ivanti_token: "{{ lookup('env', 'IVANTI_TOKEN') }}"

  tasks:
    - name: Create incident
      mlowcher61.ivanti_itsm.ivanti_incident:
        base_url: "{{ ivanti_base_url }}"
        token: "{{ ivanti_token }}"
        validate_certs: true
        state: present
        subject: "Network drift detected on {{ device_name | default('unknown-device') }}"
        description: |
          Ansible Automation Platform detected configuration drift.
          Resource: {{ drift_resource | default('unknown') }}
          AAP Job ID: {{ tower_job_id | default('manual-run') }}
        priority: "{{ ivanti_priority | default('High') }}"
        fields:
          Category: "Network"
          Source: "Ansible Automation Platform"
      register: created_incident

    - name: Show Ivanti response
      ansible.builtin.debug:
        var: created_incident.record
